name: Publish to npm

on:
  release:
    types: [published]
  # Manual dispatch bootstraps the very first publish before this file is on main:
  #   gh workflow run publish-npm.yml --ref <branch>
  workflow_dispatch:

jobs:
  publish:
    # Release tags are version tags (v1.2.3); workflow_dispatch has no tag, so allow it too.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # npm provenance / trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
      # Never publish rule copies that drifted from CLAUDE.md (the single source).
      - run: node scripts/build-rules.js --check
      # Zero runtime deps, so no install step — publish the committed files as-is.
      - run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
